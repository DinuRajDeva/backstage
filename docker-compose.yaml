version: "3.8"

services:
  backstage:
    image: backstage:latest
    container_name: backstage-app

    ports:
      - "7007:7007"

    environment:
      # Match how you open Backstage (single port in this compose file).
      BACKSTAGE_APP_BASE_URL: http://localhost:7007
      BACKSTAGE_BACKEND_BASE_URL: http://localhost:7007
      # Used by node-pg when connection.ssl is omitted. With ssl in app-config*, yaml wins.
      PGSSLMODE: no-verify
      # Uncomment if app-config.production.yaml uses ${POSTGRES_*} placeholders:
      # POSTGRES_HOST: database-1.xxx.rds.amazonaws.com
      # POSTGRES_PORT: "5432"
      # POSTGRES_USER: postgres
      # POSTGRES_PASSWORD: secret

    volumes:
      # Optional: mount config if not baked into the image
      # - ./app-config.yaml:/app/app-config.yaml
      - ./app:/app
      #- ./app/app-config.yaml:/app/app-config.yaml
    # command:
    #   - node
    #   - packages/backend
    #   - --config
    #   - /app/app-config.yaml

    networks:
      - postgres_network

    restart: unless-stopped

# Use existing Docker network (e.g. from a separate Postgres stack)
networks:
  postgres_network:
    external: true
    name: postgres_default
